version: "3.9"

services:
  # ── Infrastructure ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: kothkori
      POSTGRES_USER: kothkori
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kothkori"]
      interval: 10s

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes

  # ── Zero-Cost LLM: Ollama ───────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── Application Services ────────────────────────────────────────
  gateway:
    build: ./services/gateway
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  ai-worker:
    build: ./services/ai-worker
    env_file: .env
    depends_on:
      - redis
      - postgres
      - ollama
    deploy:
      replicas: 3
    restart: unless-stopped

  stt-service:
    build:
      context: ./services/stt-service
      dockerfile: Dockerfile.gpu
    env_file: .env
    volumes:
      - ./ml/whisper-finetune/models:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  pdf-service:
    build: ./services/pdf-service
    env_file: .env
    depends_on:
      - postgres
    restart: unless-stopped

  notification-service:
    build: ./services/notification-service
    env_file: .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  ollama_models:
