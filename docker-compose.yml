services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: kothkori
      POSTGRES_USER: kothkori
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kothkori"]
      interval: 10s

  redis:
    image: redis:7-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    command: >
      sh -c "redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  orchestrator-worker:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    env_file: .env
    command: celery -A services.orchestrator.celery_entrypoint worker --loglevel=info --concurrency=6 -Q celery
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
