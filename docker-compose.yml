version: "3.9"

services:
  # ── Infrastructure ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: kothkori
      POSTGRES_USER: kothkori
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kothkori"]
      interval: 10s

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes

  # ── Tier-3 fallback LLM + embeddings (self-hosted, see ARCHITECTURE.md) ──
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── Observability (NEW in v2 — see ARCHITECTURE.md #6) ─────────────
  langfuse:
    image: langfuse/langfuse:2
    environment:
      DATABASE_URL: postgresql://kothkori:${POSTGRES_PASSWORD}@postgres:5432/kothkori
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      NEXTAUTH_URL: http://localhost:3000
      SALT: ${LANGFUSE_SALT}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Application Services ────────────────────────────────────────
  gateway:
    build: ./services/gateway
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  orchestrator-worker:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    env_file: .env
    command: celery -A services.orchestrator.celery_entrypoint worker --loglevel=info -Q celery
    depends_on:
      - redis
      - postgres
      - ollama
    deploy:
      replicas: 3
    restart: unless-stopped

  voice-gateway:
    build:
      context: .
      dockerfile: services/voice_gateway/Dockerfile.gpu
    env_file: .env
    volumes:
      - ./ml/whisper-finetune/models:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  pdf-service:
    build: ./services/pdf_service
    env_file: .env
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  ollama_models:
