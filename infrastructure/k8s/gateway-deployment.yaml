apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: kotha-khata
spec:
  replicas: 3
  selector:
    matchLabels: {app: gateway}
  template:
    metadata:
      labels: {app: gateway}
    spec:
      containers:
      - name: gateway
        image: kotha-khata/gateway:latest
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: kotha-khata-secrets
        resources:
          requests: {cpu: "250m", memory: "256Mi"}
          limits:   {cpu: "500m", memory: "512Mi"}
        readinessProbe:
          httpGet: {path: /health, port: 8000}
          initialDelaySeconds: 10
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-hpa
  namespace: kotha-khata
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target: {type: Utilization, averageUtilization: 70}
